# Uncomment to enable encoder
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# OLED is intentionally left disabled in this XIAO BLE override.
# If you wire an OLED to the XIAO's I2C pins later, add a matching overlay first.
# CONFIG_ZMK_DISPLAY=y

CONFIG_ZMK_HID_REPORT_TYPE_NKR0=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Split BLE stability tuning without blowing up RAM on XIAO BLE.
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=1024
CONFIG_ZMK_LOW_PRIORITY_THREAD_STACK_SIZE=1024
CONFIG_ZMK_BLE_THREAD_PRIORITY=3
