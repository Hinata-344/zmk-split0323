# Uncomment to enable encoder
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the Lily58 OLED Display
# CONFIG_ZMK_DISPLAY=y

# ZMK Studio is enabled from the central-half build in build.yaml.
# If you switch the USB-connected central side, move the Studio snippet there too.
CONFIG_ZMK_STUDIO_LOCKING=n
